services:
  postgres:
    image: postgis/postgis:18-3.6
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      API_PORT: ${API_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      MARTIN_USER: ${MARTIN_USER}
      MARTIN_PASSWORD: ${MARTIN_PASSWORD}
      APP_URL: ${APP_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      AVATARS_DIR: ${AVATARS_DIR}
      TRAILS_IMG_DIR: ${TRAILS_IMG_DIR}
    ports:
      - "${API_PORT}:${API_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      WEB_PORT: ${WEB_PORT}
      PORT: ${WEB_PORT}
      API_URL: http://api:${API_PORT}
    ports:
      - "${WEB_PORT}:${WEB_PORT}"
    depends_on:
      - api

  nginx:
    image: nginx:latest
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - uploads:/var/www/uploads:ro
    environment:
      API_HOST: api
      API_PORT: ${API_PORT}
      WEB_HOST: web
      WEB_PORT: ${WEB_PORT}
      MARTIN_HOST: martin
      MARTIN_PORT: ${MARTIN_PORT}
    depends_on:
      - api
      - web

  martin:
    image: ghcr.io/maplibre/martin:1.11.0
    restart: unless-stopped
    environment:
      MARTIN_PORT: ${MARTIN_PORT}
      DATABASE_URL: postgresql://${MARTIN_USER}:${MARTIN_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "${MARTIN_PORT}:${MARTIN_PORT}"
    depends_on:
      - postgres
    volumes:
      - ./martin/config.yaml:/etc/martin/martin.yaml:ro
    command: ["--config", "/etc/martin/martin.yaml"]

volumes:
  pgdata:
  uploads:
