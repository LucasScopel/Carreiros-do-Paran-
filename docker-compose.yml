services:
  postgres_dev:
    image: postgis/postgis:18-3.6
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  nginx_dev:
    image: nginx:latest
    container_name: nginx_proxy
    restart: unless-stopped
    environment:
      WEB_HOST: host.docker.internal
      WEB_PORT: ${WEB_PORT}
      API_HOST: host.docker.internal
      API_PORT: ${API_PORT}
      MARTIN_HOST: host.docker.internal
      MARTIN_PORT: ${MARTIN_PORT}
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./uploads:/var/www/uploads:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - martin_dev

  martin_dev:
    image: ghcr.io/maplibre/martin:1.11.0
    restart: unless-stopped
    environment:
      MARTIN_PORT: ${MARTIN_PORT}
      DATABASE_URL: postgresql://${MARTIN_USER}:${MARTIN_PASSWORD}@postgres_dev:5432/${POSTGRES_DB}
    ports:
      - "${MARTIN_PORT}:${MARTIN_PORT}"
    depends_on:
      - postgres_dev
    volumes:
      - ./martin/config.yaml:/etc/martin/martin.yaml:ro
    command: ["--config", "/etc/martin/martin.yaml"]

volumes:
  postgres_data:
